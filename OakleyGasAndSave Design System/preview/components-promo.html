<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head><body><div class="card">
  <div class="label">Promo card — deals teaser pattern</div>
  <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:14px;">
    <div style="position:relative;padding:24px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:16px;">
      <span style="position:absolute;top:14px;right:14px;padding:4px 10px;background:#f59e0b;color:#0d0f14;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;border-radius:8px;">Limited Time</span>
      <div style="font-size:18px;font-weight:700;color:#f1f5f9;margin-bottom:4px;">$0.10 Off Per Gallon</div>
      <div style="font-size:13px;color:#94a3b8;line-height:1.5;margin-bottom:12px;">Fill up and save with our weekly fuel discount. Price shown at the pump.</div>
      <div style="font-size:13px;color:#f59e0b;font-weight:600;">View Deal →</div>
    </div>
    <div style="position:relative;padding:24px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:16px;">
      <span style="position:absolute;top:14px;right:14px;padding:4px 10px;background:#f59e0b;color:#0d0f14;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;border-radius:8px;">Daily Special</span>
      <div style="font-size:18px;font-weight:700;color:#f1f5f9;margin-bottom:4px;">Coffee + Pastry $2.99</div>
      <div style="font-size:13px;color:#94a3b8;line-height:1.5;margin-bottom:12px;">Fresh-brewed coffee and a warm pastry for under three bucks.</div>
      <div style="font-size:13px;color:#f59e0b;font-weight:600;">View Deal →</div>
    </div>
  </div>
</div></body></html>
