<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head><body><div class="card">
  <div class="label">Surface &amp; background scale</div>
  <div class="row">
    <div class="swatch" style="background:#0d0f14;color:#f1f5f9;">
      <div class="swatch__name">Bg / Primary</div>
      <div class="swatch__value">#0d0f14</div>
    </div>
    <div class="swatch" style="background:#141821;color:#f1f5f9;">
      <div class="swatch__name">Bg / Secondary</div>
      <div class="swatch__value">#141821</div>
    </div>
    <div class="swatch" style="background:rgba(255,255,255,0.04);color:#f1f5f9;border-color:rgba(255,255,255,0.08);">
      <div class="swatch__name">Bg / Card</div>
      <div class="swatch__value">rgba(255,255,255,.04)</div>
    </div>
    <div class="swatch" style="background:rgba(255,255,255,0.06);color:#f1f5f9;border-color:rgba(255,255,255,0.08);backdrop-filter:blur(8px);">
      <div class="swatch__name">Bg / Glass</div>
      <div class="swatch__value">rgba(255,255,255,.06)</div>
    </div>
    <div class="swatch" style="background:rgba(255,255,255,0.1);color:#f1f5f9;border-color:rgba(255,255,255,0.15);">
      <div class="swatch__name">Bg / Glass hover</div>
      <div class="swatch__value">rgba(255,255,255,.10)</div>
    </div>
  </div>
</div></body></html>
