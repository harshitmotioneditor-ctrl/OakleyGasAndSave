<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head><body><div class="card">
  <div class="label">Badges &amp; status pills</div>
  <div class="row" style="align-items:center;">
    <span style="display:inline-flex;gap:6px;align-items:center;padding:4px 10px;border-radius:9999px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:#94a3b8;font-size:12px;font-weight:600;">Default</span>
    <span style="display:inline-flex;gap:6px;align-items:center;padding:4px 10px;border-radius:9999px;background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.3);color:#f59e0b;font-size:12px;font-weight:600;">Limited Time</span>
    <span style="display:inline-flex;gap:6px;align-items:center;padding:4px 10px;border-radius:9999px;background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);color:#22c55e;font-size:12px;font-weight:600;">In Stock</span>
  </div>
  <div class="row" style="align-items:center;">
    <span style="display:inline-flex;gap:8px;align-items:center;padding:8px 16px;border-radius:9999px;background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);color:#22c55e;font-size:14px;font-weight:600;">
      <span style="width:8px;height:8px;border-radius:50%;background:currentColor;display:inline-block;"></span>
      Open Now · Until 11:00 PM
    </span>
    <span style="display:inline-flex;gap:8px;align-items:center;padding:8px 16px;border-radius:9999px;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#ef4444;font-size:14px;font-weight:600;">
      <span style="width:8px;height:8px;border-radius:50%;background:currentColor;display:inline-block;"></span>
      Closed · Opens at 5:00 AM
    </span>
  </div>
  <div style="font-size:12px;color:#64748b;">Status dot pulses (2s ease-in-out · 100% → 50% opacity).</div>
</div></body></html>
