<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head><body><div class="card">
  <div class="label">Buttons</div>
  <div class="row" style="align-items:center;">
    <button style="display:inline-flex;align-items:center;gap:8px;padding:12px 24px;background:#f59e0b;color:#0d0f14;font-weight:600;font-size:14px;border:none;border-radius:12px;box-shadow:0 0 20px rgba(245,158,11,.25);cursor:pointer;">
      Get Directions
    </button>
    <button style="display:inline-flex;align-items:center;gap:8px;padding:12px 24px;background:rgba(255,255,255,.06);color:#f1f5f9;font-weight:600;font-size:14px;border:1px solid rgba(255,255,255,.08);border-radius:12px;cursor:pointer;">
      View Fuel Options
    </button>
    <button style="display:inline-flex;align-items:center;gap:8px;padding:12px 24px;background:transparent;color:#f59e0b;font-weight:600;font-size:14px;border:1px solid #f59e0b;border-radius:12px;cursor:pointer;">
      Learn More
    </button>
  </div>
  <div class="row" style="align-items:center;">
    <button style="display:inline-flex;align-items:center;gap:8px;padding:16px 32px;background:#f59e0b;color:#0d0f14;font-weight:600;font-size:16px;border:none;border-radius:16px;box-shadow:0 0 20px rgba(245,158,11,.25);cursor:pointer;">
      Primary · Large
    </button>
    <button style="width:40px;height:40px;padding:0;background:rgba(255,255,255,.06);color:#f1f5f9;border:1px solid rgba(255,255,255,.08);border-radius:9999px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
    </button>
    <a style="display:inline-flex;align-items:center;gap:6px;color:#f59e0b;text-decoration:none;font-size:14px;font-weight:600;">Text link →</a>
  </div>
  <div style="font-size:12px;color:#64748b;">Hover: primary brightens + -2px lift + wider glow · Secondary brightens glass · All use 250ms ease.</div>
</div></body></html>
