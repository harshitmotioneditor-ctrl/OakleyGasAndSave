<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head><body><div class="card" style="background:#141821;">
  <div class="label">Elevation — three shadow tiers + one amber glow</div>
  <div style="display:flex;gap:20px;flex-wrap:wrap;padding:24px 0;">
    <div style="width:140px;height:100px;background:#1b2030;border-radius:12px;box-shadow:0 1px 2px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;font-size:12px;color:#94a3b8;font-family:monospace;">shadow-sm</div>
    <div style="width:140px;height:100px;background:#1b2030;border-radius:12px;box-shadow:0 4px 12px rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;font-size:12px;color:#94a3b8;font-family:monospace;">shadow-md</div>
    <div style="width:140px;height:100px;background:#1b2030;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;font-size:12px;color:#94a3b8;font-family:monospace;">shadow-lg</div>
    <div style="width:140px;height:100px;background:#f59e0b;border-radius:12px;box-shadow:0 0 20px rgba(245,158,11,.35);display:flex;align-items:center;justify-content:center;font-size:12px;color:#0d0f14;font-weight:700;font-family:monospace;">shadow-glow</div>
  </div>
  <div style="font-size:12px;color:#64748b;">Glow appears ONLY on primary buttons and the active nav pill.</div>
</div></body></html>
